<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbre Genealògic · Família Santamaria-Velasco</title>
<style>
  :root {
    --bg:#fdf8f0; --hdr:#7c4a1e; --card-bg:#fff9f2; --border:#c8a87a;
    --line:#a07850; --blue:#3a6186; --pink:#a04060; --shadow:rgba(100,60,20,.15);
    --green:#2e7d32; --red:#c62828;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:Georgia,serif;overflow:hidden;}

  header{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:var(--hdr);color:#fff;
    display:flex;align-items:center;gap:10px;padding:9px 18px;
    box-shadow:0 2px 8px var(--shadow);
  }
  header h1{font-size:1.1rem;flex:1;}
  header a,header button{
    background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.35);
    padding:5px 11px;border-radius:4px;cursor:pointer;font-size:.8rem;
    text-decoration:none;white-space:nowrap;font-family:inherit;
  }
  header a:hover,header button:hover{background:rgba(255,255,255,.35);}

  #canvas{position:fixed;top:50px;left:0;right:0;bottom:0;overflow:auto;cursor:grab;}
  #canvas:active{cursor:grabbing;}
  #tree-wrap{position:relative;min-width:100%;min-height:100%;padding:50px 60px 100px;}

  #svg-lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
  .line-couple{stroke:var(--line);stroke-width:2;fill:none;}
  .line-child{stroke:var(--line);stroke-width:1.5;fill:none;}

  #tree{position:relative;}
  .gen-label-abs{
    position:absolute;font-size:.62rem;color:#bbb;letter-spacing:1px;
    text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);
    left:4px;user-select:none;
  }
  .heart-abs{
    position:absolute;font-size:.9rem;color:var(--line);
    pointer-events:none;user-select:none;text-align:center;
  }

  .person{
    width:148px;background:var(--card-bg);border:1.5px solid var(--border);
    border-radius:8px;overflow:hidden;box-shadow:0 2px 8px var(--shadow);
    cursor:pointer;transition:transform .15s,box-shadow .15s;
  }
  .person:hover{transform:translateY(-3px);box-shadow:0 6px 18px var(--shadow);}
  .person.home{border-top:4px solid var(--blue);}
  .person.dona{border-top:4px solid var(--pink);}
  .person.jo{outline:3px solid gold;outline-offset:1px;}

  .person-foto{
    width:100%;height:84px;background:#e8dcc8;
    display:flex;align-items:center;justify-content:center;font-size:2.3rem;overflow:hidden;
  }
  .person-foto img{width:100%;height:100%;object-fit:cover;}
  .person-info{padding:6px 8px;}
  .person-nom{font-size:.78rem;font-weight:bold;color:#333;line-height:1.2;}
  .person-dates{font-size:.67rem;color:#999;margin-top:2px;}

  /* MODAL */
  #modal-bg{
    display:none;position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,.5);align-items:center;justify-content:center;
  }
  #modal-bg.open{display:flex;}
  #modal{
    background:var(--card-bg);border-radius:12px;
    box-shadow:0 8px 32px rgba(0,0,0,.3);
    max-width:460px;width:92%;max-height:88vh;overflow-y:auto;
    padding:22px;position:relative;
  }
  #modal-close{
    position:absolute;top:10px;right:12px;
    background:none;border:none;font-size:1.3rem;cursor:pointer;color:#aaa;
  }
  #modal-edit-btn{
    position:absolute;top:10px;right:40px;
    background:var(--hdr);color:#fff;border:none;border-radius:4px;
    padding:3px 10px;font-size:.75rem;cursor:pointer;font-family:inherit;
  }
  .modal-foto{
    width:100%;height:160px;border-radius:8px;margin-bottom:12px;
    background:#e8dcc8;display:flex;align-items:center;justify-content:center;
    font-size:4rem;overflow:hidden;
  }
  .modal-foto img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
  #modal h2{font-size:1.15rem;color:var(--hdr);margin-bottom:2px;}
  #modal .sub{font-size:.78rem;color:#aaa;margin-bottom:12px;}
  #modal dl{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:.84rem;}
  #modal dt{color:#999;}
  #modal dd{color:#333;}
  .modal-notes{margin-top:10px;font-size:.82rem;color:#666;font-style:italic;border-top:1px solid #eee;padding-top:8px;}

  /* EDIT FORM dins el modal */
  #edit-form{display:none;}
  #edit-form .ef-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  #edit-form .ef-field{margin-bottom:8px;}
  #edit-form label{display:block;font-size:.75rem;color:#888;margin-bottom:2px;}
  #edit-form input,#edit-form select,#edit-form textarea{
    width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;
    font-size:.84rem;font-family:inherit;background:#fff;color:#333;
  }
  #edit-form textarea{height:60px;resize:vertical;}
  #edit-form input:focus,#edit-form select:focus,#edit-form textarea:focus{
    outline:none;border-color:var(--hdr);box-shadow:0 0 0 2px rgba(124,74,30,.12);
  }
  .edit-actions{display:flex;gap:8px;margin-top:14px;}
  .btn-save{flex:1;padding:9px;background:var(--green);color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:inherit;font-size:.88rem;}
  .btn-cancel-edit{flex:1;padding:9px;background:#eee;color:#555;border:none;border-radius:5px;cursor:pointer;font-family:inherit;font-size:.88rem;}
  .btn-save:hover{opacity:.85;} .btn-cancel-edit:hover{background:#ddd;}
  .btn-delete{padding:9px 14px;background:var(--red);color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:inherit;font-size:.88rem;}
  #save-ok{display:none;margin-top:8px;font-size:.82rem;color:var(--green);text-align:center;}

  /* BANNER formulari */
  #banner-form{
    position:fixed;bottom:20px;right:20px;z-index:100;
    background:linear-gradient(135deg,#2e7d32,#43a047);
    color:#fff;border:none;border-radius:12px;
    padding:14px 20px;font-family:inherit;cursor:pointer;
    box-shadow:0 4px 18px rgba(46,125,50,.35);
    display:flex;flex-direction:column;align-items:center;gap:3px;
    text-decoration:none;max-width:170px;text-align:center;
    transition:transform .15s,box-shadow .15s;
  }
  #banner-form:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(46,125,50,.45);}
  #banner-form .bf-icon{font-size:1.6rem;line-height:1;}
  #banner-form .bf-title{font-size:.82rem;font-weight:bold;line-height:1.2;}
  #banner-form .bf-sub{font-size:.68rem;opacity:.85;line-height:1.3;}

  /* ADD PERSON button (admin) */
  #btn-add-person{
    position:fixed;bottom:20px;right:200px;z-index:100;
    background:var(--hdr);color:#fff;border:none;border-radius:50px;
    padding:11px 20px;font-size:.9rem;cursor:pointer;font-family:inherit;
    box-shadow:0 4px 14px var(--shadow);
  }
  #btn-add-person:hover{opacity:.88;}

  /* LOADING */
  #loading{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:var(--bg);z-index:300;gap:14px;
  }
  .spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:var(--hdr);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading p{color:var(--hdr);font-size:.9rem;}

  #legend{
    position:fixed;bottom:14px;left:16px;z-index:100;
    background:rgba(255,249,242,.92);border:1px solid var(--border);
    border-radius:8px;padding:7px 12px;font-size:.7rem;color:#777;
  }
  #legend div{display:flex;align-items:center;gap:6px;margin:2px 0;}
  .lb{width:13px;height:9px;border-radius:2px;border:1px solid #c8a87a;}
</style>
</head>

<!-- MODAL VIEW / EDIT -->

<script src="config.js"></script>
<script>
// ── TRADUCCIONS ──────────────────────────────────────────────
const T = {
  ca:{
    load:'Carregant arbre…',lang:'Castellano',
    home:'Home',dona:'Dona',jo:'Tu',
    naix:'Nascut/da',lloc_naix:'Lloc de naixement',
    mort:'Mort/da',lloc_mort:'Lloc de defunció',
    ofici:'Ofici',llocs:'Llocs on va viure',
    pares:'Pares',fills:'Fills',parella:'Parella',notes:'Notes',
    edit:'✏️ Editar',save:'💾 Desar i descarregar JSON',cancel:'Cancel·lar',
    saveOk:'✅ familia.json descarregat! Puja\'l a GitHub per actualitzar l\'arbre.',
    gen:['Fills','Pares','Avis','Besavis','Rebesavis','Tataraavis'],
    bannerTitle:'Proposa un nou membre',bannerSub:'Formulari per afegir família',
  },
  es:{
    load:'Cargando árbol…',lang:'Català',
    home:'Hombre',dona:'Mujer',jo:'Tú',
    naix:'Nacido/a',lloc_naix:'Lugar de nacimiento',
    mort:'Fallecido/a',lloc_mort:'Lugar de defunción',
    ofici:'Oficio',llocs:'Lugares donde vivió',
    pares:'Padres',fills:'Hijos',parella:'Pareja',notes:'Notas',
    edit:'✏️ Editar',save:'💾 Guardar y descargar JSON',cancel:'Cancelar',
    saveOk:'✅ familia.json descargado. Súbelo a GitHub para actualizar el árbol.',
    gen:['Hijos','Padres','Abuelos','Bisabuelos','Tatarabuelos','Choznos'],
    bannerTitle:'Proponer un nuevo miembro',bannerSub:'Formulario para añadir familia',
  }
};
let lang=localStorage.getItem('lang')||'ca', t=T[lang];

function toggleLang(){
  lang=lang==='ca'?'es':'ca'; t=T[lang];
  localStorage.setItem('lang',lang);
  document.getElementById('btn-lang').textContent=t.lang;
  document.getElementById('lg-home').textContent=t.home;
  document.getElementById('lg-dona').textContent=t.dona;
  document.getElementById('lg-jo').textContent=t.jo;
  document.getElementById('bf-title').textContent=t.bannerTitle;
  document.getElementById('bf-sub').textContent=t.bannerSub;
  if(window._data) renderTree(window._data);
}

// ── DATA ─────────────────────────────────────────────────────
async function loadData(){
  const url=(typeof FAMILIA_JSON_URL!=='undefined'&&FAMILIA_JSON_URL.includes('raw.githubusercontent'))
    ?FAMILIA_JSON_URL:'familia.json';
  const r=await fetch(url+'?t='+Date.now());
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

// ── MAPS ─────────────────────────────────────────────────────
function buildMaps({persones,unions}){
  const byId={},childrenOf={},parentsOf={},partnersOf={};
  persones.forEach(p=>{byId[p.id]=p;childrenOf[p.id]=[];parentsOf[p.id]=[];partnersOf[p.id]=[];});
  persones.forEach(p=>{
    if(p.pare_id&&byId[p.pare_id]){parentsOf[p.id].push(p.pare_id);childrenOf[p.pare_id].push(p.id);}
    if(p.mare_id&&byId[p.mare_id]){parentsOf[p.id].push(p.mare_id);childrenOf[p.mare_id].push(p.id);}
  });
  (unions||[]).forEach(u=>{
    if(byId[u.persona1_id]) partnersOf[u.persona1_id].push(u.persona2_id);
    if(byId[u.persona2_id]) partnersOf[u.persona2_id].push(u.persona1_id);
  });
  return{byId,childrenOf,parentsOf,partnersOf};
}

// ── GENERACIÓ (amb correcció de parelles sense pares) ────────
function assignGen(persones,maps){
  const{childrenOf,parentsOf,partnersOf}=maps;
  const gen={};
  const noParents=new Set(persones.filter(p=>parentsOf[p.id].length===0).map(p=>p.id));

  function propagate(id,g){
    if(gen[id]!==undefined&&gen[id]>=g) return;
    gen[id]=g;
    (childrenOf[id]||[]).forEach(c=>propagate(c,g+1));
  }

  // Pas 1: propaga des de totes les persones sense pares
  noParents.forEach(id=>propagate(id,0));

  // Pas 2: eleva parelles sense pares a la generació de la seva parella
  // (ex: Ricardo Mur → gen de Asunción Castel Riba)
  let changed=true;
  while(changed){
    changed=false;
    noParents.forEach(id=>{
      const spGens=(partnersOf[id]||[]).map(pid=>gen[pid]).filter(g=>g!==undefined);
      if(!spGens.length) return;
      const maxSp=Math.max(...spGens);
      if(maxSp>(gen[id]||0)){
        gen[id]=maxSp;
        (childrenOf[id]||[]).forEach(c=>propagate(c,maxSp+1));
        changed=true;
      }
    });
  }
  persones.forEach(p=>{if(gen[p.id]===undefined) gen[p.id]=0;});
  return gen;
}

// ── NOM COMPLET ───────────────────────────────────────────────
const nomC=p=>[p.nom,p.cognom1,p.cognom2].filter(Boolean).join(' ');

// ── CONSTANTS DE LAYOUT ───────────────────────────────────────
const CW=148, CH=136, GY=80, HW=20, CG=6, FG=32;
const COUPLE_W=CW+CG+HW+CG+CW; // 328px per una parella

// ── ALGORISME DE LAYOUT (posicionament absolut) ───────────────
function computeLayout(data,maps,genMap){
  const{byId,childrenOf,partnersOf}=maps;

  function sameGenPartner(pid){
    return(partnersOf[pid]||[]).find(id=>byId[id]&&genMap[id]===genMap[pid])||null;
  }

  function primaryKids(pid){
    const pid2=sameGenPartner(pid);
    return[...new Set([
      ...(childrenOf[pid]||[]),
      ...(pid2?(childrenOf[pid2]||[]):[])
    ])].filter(id=>{
      if(!byId[id]) return false;
      const c=byId[id];
      return c.pare_id===pid||c.mare_id===pid||
             (pid2&&(c.pare_id===pid2||c.mare_id===pid2));
    });
  }

  // Amplada mínima del subàrbre de pid (recursiu)
  const wCache={};
  function subtreeW(pid){
    if(wCache[pid]!==undefined) return wCache[pid];
    const pid2=sameGenPartner(pid);
    const selfW=pid2?COUPLE_W:CW;
    const kids=primaryKids(pid);
    if(!kids.length){wCache[pid]=selfW;return selfW;}
    const kidsW=kids.reduce((s,id,i)=>s+subtreeW(id)+(i?FG:0),0);
    const w=Math.max(selfW,kidsW);
    wCache[pid]=w; return w;
  }

  const placed=new Set();
  const xPos={},yPos={};

  function place(pid,cx){
    if(placed.has(pid)) return;
    placed.add(pid);
    const pid2=sameGenPartner(pid);
    const rowY=genMap[pid]*(CH+GY)+50;
    yPos[pid]=rowY;
    if(pid2&&!placed.has(pid2)){
      placed.add(pid2);
      yPos[pid2]=rowY;
      xPos[pid]=cx-COUPLE_W/2;               // membre esquerra
      xPos[pid2]=cx-COUPLE_W/2+CW+CG+HW+CG;  // membre dreta
    } else if(!placed.has(pid)||xPos[pid]===undefined){
      xPos[pid]=cx-CW/2;
    }
    const kids=primaryKids(pid).filter(id=>!placed.has(id));
    if(!kids.length) return;
    const ws=kids.map(id=>subtreeW(id));
    const total=ws.reduce((s,w)=>s+w,0)+FG*(kids.length-1);
    let kx=cx-total/2;
    kids.forEach((id,i)=>{
      place(id,kx+ws[i]/2);
      kx+=ws[i]+FG;
    });
  }

  // Troba les arrels (gen 0)
  const g0=data.persones.filter(p=>genMap[p.id]===0);
  const rootSeen=new Set();
  const roots=[];
  g0.forEach(p=>{
    if(rootSeen.has(p.id)) return;
    const pt=sameGenPartner(p.id);
    roots.push(p.id);
    rootSeen.add(p.id);
    if(pt) rootSeen.add(pt);
  });

  const rootWs=roots.map(subtreeW);
  const totalW=rootWs.reduce((s,w)=>s+w,0)+FG*(roots.length-1);
  const pageCenter=Math.max(totalW/2+80,500);
  let rcx=pageCenter-totalW/2;
  roots.forEach((id,i)=>{
    place(id,rcx+rootWs[i]/2);
    rcx+=rootWs[i]+FG;
  });

  // Qualsevol persona no col·locada (per si de cas)
  data.persones.forEach(p=>{
    if(xPos[p.id]===undefined){
      xPos[p.id]=80; yPos[p.id]=genMap[p.id]*(CH+GY)+50;
    }
  });

  return{xPos,yPos};
}

// ── RENDER ───────────────────────────────────────────────────
function renderTree(data){
  window._data=data;
  const{persones}=data;
  const container=document.getElementById('tree');
  const svg=document.getElementById('svg-lines');
  container.innerHTML=''; svg.innerHTML='';

  const maps=buildMaps(data);
  const gen=assignGen(persones,maps);
  window._maps=maps; window._gen=gen;

  const{xPos,yPos}=computeLayout(data,maps,gen);
  window._xPos=xPos; window._yPos=yPos;

  const maxGen=Math.max(...Object.values(gen));
  const maxX=Math.max(...Object.values(xPos))+CW+80;
  const maxY=Math.max(...Object.values(yPos))+CH+80;
  container.style.cssText=`position:relative;width:${maxX}px;height:${maxY}px;`;

  // Etiquetes de generació (una per fila)
  const gLabeled=new Set();
  persones.forEach(p=>{
    const g=gen[p.id];
    if(gLabeled.has(g)) return;
    gLabeled.add(g);
    const lbl=document.createElement('div');
    lbl.className='gen-label-abs';
    lbl.style.top=(yPos[p.id]+CH/2)+'px';
    lbl.textContent=t.gen[maxGen-g]||`G${g}`;
    container.appendChild(lbl);
  });

  // Cors entre parelles
  (data.unions||[]).forEach(u=>{
    if(gen[u.persona1_id]!==gen[u.persona2_id]) return;
    const x1=xPos[u.persona1_id],x2=xPos[u.persona2_id];
    if(x1===undefined||x2===undefined) return;
    const leftX=Math.min(x1,x2)+CW+CG;
    const topY=yPos[u.persona1_id]+CH/2-10;
    const h=document.createElement('div');
    h.className='heart-abs';
    h.style.cssText=`left:${leftX}px;top:${topY}px;width:${HW}px;`;
    h.textContent='♡';
    container.appendChild(h);
  });

  // Targetes de persones
  persones.forEach(p=>{
    const card=makeCard(p,maps);
    card.style.position='absolute';
    card.style.left=xPos[p.id]+'px';
    card.style.top=yPos[p.id]+'px';
    container.appendChild(card);
  });

  requestAnimationFrame(()=>drawLines(persones,maps,gen));
}

function makeCard(p,maps){
  const card=document.createElement('div');
  card.className='person'+(p.genere?` ${p.genere}`:'');
  if(p.id==='p13') card.classList.add('jo');
  card.dataset.id=p.id;

  const foto=document.createElement('div'); foto.className='person-foto';
  if(p.foto_url){
    const img=document.createElement('img'); img.src=p.foto_url; img.alt=p.nom;
    img.onerror=()=>{foto.innerHTML='';foto.textContent=p.genere==='dona'?'👩':'👨';};
    foto.appendChild(img);
  } else { foto.textContent=p.genere==='dona'?'👩':p.genere==='home'?'👨':'🧑'; }

  const info=document.createElement('div'); info.className='person-info';
  const nom=document.createElement('div'); nom.className='person-nom'; nom.textContent=nomC(p);
  const dates=document.createElement('div'); dates.className='person-dates';
  const ny=p.data_naix?p.data_naix.slice(0,4):null, dy=p.data_mort?p.data_mort.slice(0,4):null;
  dates.textContent=ny?(dy?`${ny} – ${dy}`:`* ${ny}`):'';
  info.append(nom,dates); card.append(foto,info);
  card.addEventListener('click',()=>openModal(p,maps));
  return card;
}

// ── LÍNIES EN ANGLE RECTE (usa posicions pre-calculades) ─────
function drawLines(persones,maps,gen){
  const svg=document.getElementById('svg-lines');
  const xP=window._xPos, yP=window._yPos;

  function pos(id){
    if(xP[id]===undefined) return null;
    // Usa l'altura real de la targeta del DOM
    const el=document.querySelector(`.person[data-id="${id}"]`);
    const h=el?el.offsetHeight:CH;
    const x=xP[id],y=yP[id];
    return{x,y,w:CW,h,cx:x+CW/2,top:y,bot:y+h,mid:y+h/2};
  }

  function seg(x1,y1,x2,y2,cls){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',Math.round(x1));l.setAttribute('y1',Math.round(y1));
    l.setAttribute('x2',Math.round(x2));l.setAttribute('y2',Math.round(y2));
    l.setAttribute('class',cls||'line-child');
    svg.appendChild(l);
  }

  const maxX=Math.max(...Object.values(xP))+CW+80;
  const maxY=Math.max(...Object.values(yP))+CH+80;
  svg.setAttribute('width',maxX); svg.setAttribute('height',maxY);

  // Línies de parella
  (window._data.unions||[]).forEach(u=>{
    if(gen[u.persona1_id]!==gen[u.persona2_id]) return;
    const r1=pos(u.persona1_id),r2=pos(u.persona2_id);
    if(!r1||!r2) return;
    const midY=r1.mid;
    const lx1=Math.min(r1.x+r1.w,r2.x+r2.w), lx2=Math.max(r1.x,r2.x);
    seg(lx1,midY,lx2,midY,'line-couple');
  });

  // Brackets pares → fills
  const grups={};
  persones.forEach(child=>{
    const pids=[child.pare_id,child.mare_id].filter(Boolean);
    if(!pids.length) return;
    const key=pids.slice().sort().join('|');
    if(!grups[key]) grups[key]={pids,kids:[]};
    grups[key].kids.push(child.id);
  });

  Object.values(grups).forEach(({pids,kids})=>{
    const pRects=pids.map(pos).filter(Boolean);
    const kRects=kids.map(id=>pos(id)).filter(Boolean);
    if(!pRects.length||!kRects.length) return;
    const midX=pRects.reduce((s,r)=>s+r.cx,0)/pRects.length;
    const fromY=Math.max(...pRects.map(r=>r.bot));
    const toY=Math.min(...kRects.map(r=>r.top));
    const jY=fromY+(toY-fromY)*0.42;
    seg(midX,fromY,midX,jY);
    if(kRects.length===1){
      if(Math.abs(kRects[0].cx-midX)>3) seg(midX,jY,kRects[0].cx,jY);
      seg(kRects[0].cx,jY,kRects[0].cx,kRects[0].top);
    } else {
      const lx=Math.min(...kRects.map(r=>r.cx));
      const rx=Math.max(...kRects.map(r=>r.cx));
      seg(lx,jY,rx,jY);
      kRects.forEach(r=>seg(r.cx,jY,r.cx,r.top));
    }
  });
}

// ── MODAL VIEW ───────────────────────────────────────────────
let _currentPersonId=null;

function openModal(p,maps){
  const{byId,childrenOf,partnersOf}=maps;
  _currentPersonId=p.id;

  // Reset: mode vista
  document.getElementById('view-mode').style.display='block';
  document.getElementById('edit-form').style.display='none';
  document.getElementById('modal-edit-btn').textContent=t.edit||'✏️ Editar';

  const fotoEl=document.getElementById('modal-foto');
  fotoEl.innerHTML=p.foto_url?`<img src="${p.foto_url}" alt="${p.nom}">`:(p.genere==='dona'?'👩':p.genere==='home'?'👨':'🧑');
  document.getElementById('modal-nom').textContent=nomC(p);
  document.getElementById('modal-sub').textContent=p.genere==='home'?t.home:p.genere==='dona'?t.dona:'';

  const dl=document.getElementById('modal-dl'); dl.innerHTML='';
  const add=(lbl,val)=>{if(!val&&val!==0) return; dl.innerHTML+=`<dt>${lbl}</dt><dd>${val}</dd>`;};
  const fmt=d=>d?new Date(d).toLocaleDateString(lang==='ca'?'ca-ES':'es-ES'):null;
  add(t.naix,fmt(p.data_naix)); add(t.lloc_naix,p.lloc_naix);
  if(p.data_mort||p.lloc_mort){add(t.mort,fmt(p.data_mort)||'—');add(t.lloc_mort,p.lloc_mort);}
  add(t.ofici,p.ofici);
  if(p.llocs&&p.llocs.length) add(t.llocs,p.llocs.join(', '));
  const partners=(partnersOf[p.id]||[]).map(id=>byId[id]).filter(Boolean);
  if(partners.length) add(t.parella,partners.map(nomC).join(', '));
  const pare=p.pare_id&&byId[p.pare_id],mare=p.mare_id&&byId[p.mare_id];
  if(pare||mare) add(t.pares,[pare,mare].filter(Boolean).map(nomC).join(' · '));
  const fills=(childrenOf[p.id]||[]).map(id=>byId[id]).filter(Boolean);
  if(fills.length) add(t.fills,fills.map(nomC).join(', '));
  const notesEl=document.getElementById('modal-notes');
  notesEl.textContent=p.notes||''; notesEl.style.display=p.notes?'block':'none';

  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(){document.getElementById('modal-bg').classList.remove('open');}

// ── MODAL EDIT ───────────────────────────────────────────────
function toggleEdit(){
  const viewEl=document.getElementById('view-mode');
  const editEl=document.getElementById('edit-form');
  const isEdit=editEl.style.display==='block';

  if(isEdit){
    viewEl.style.display='block'; editEl.style.display='none';
    document.getElementById('modal-edit-btn').textContent=t.edit||'✏️ Editar';
    return;
  }

  // Obre mode edició
  const p=window._data.persones.find(x=>x.id===_currentPersonId);
  if(!p) return;

  document.getElementById('e-nom').value=p.nom||'';
  document.getElementById('e-cog1').value=p.cognom1||'';
  document.getElementById('e-cog2').value=p.cognom2||'';
  document.getElementById('e-gen').value=p.genere||'';
  document.getElementById('e-naix').value=p.data_naix||'';
  document.getElementById('e-lloc-naix').value=p.lloc_naix||'';
  document.getElementById('e-mort').value=p.data_mort||'';
  document.getElementById('e-lloc-mort').value=p.lloc_mort||'';
  document.getElementById('e-ofici').value=p.ofici||'';
  document.getElementById('e-foto').value=p.foto_url||'';
  document.getElementById('e-llocs').value=(p.llocs||[]).join(', ');
  document.getElementById('e-notes').value=p.notes||'';

  // Emplena selects de pare/mare
  const persones=window._data.persones;
  ['e-pare','e-mare'].forEach(selId=>{
    const sel=document.getElementById(selId);
    const isP=selId==='e-pare';
    sel.innerHTML='<option value="">— cap —</option>';
    persones.filter(x=>x.id!==_currentPersonId).forEach(x=>{
      const opt=document.createElement('option');
      opt.value=x.id; opt.textContent=nomC(x);
      if((isP&&p.pare_id===x.id)||(!isP&&p.mare_id===x.id)) opt.selected=true;
      sel.appendChild(opt);
    });
  });

  document.getElementById('save-ok').style.display='none';
  viewEl.style.display='none'; editEl.style.display='block';
  document.getElementById('modal-edit-btn').textContent='← Vista';
}

function saveEdit(){
  const p=window._data.persones.find(x=>x.id===_currentPersonId);
  if(!p) return;

  p.nom=document.getElementById('e-nom').value.trim();
  p.cognom1=document.getElementById('e-cog1').value.trim()||null;
  p.cognom2=document.getElementById('e-cog2').value.trim()||null;
  p.genere=document.getElementById('e-gen').value||null;
  p.data_naix=document.getElementById('e-naix').value||null;
  p.lloc_naix=document.getElementById('e-lloc-naix').value.trim()||null;
  p.data_mort=document.getElementById('e-mort').value||null;
  p.lloc_mort=document.getElementById('e-lloc-mort').value.trim()||null;
  p.ofici=document.getElementById('e-ofici').value.trim()||null;
  p.foto_url=document.getElementById('e-foto').value.trim()||null;
  p.notes=document.getElementById('e-notes').value.trim()||null;
  const llocsTxt=document.getElementById('e-llocs').value.trim();
  p.llocs=llocsTxt?llocsTxt.split(',').map(s=>s.trim()).filter(Boolean):[];
  p.pare_id=document.getElementById('e-pare').value||null;
  p.mare_id=document.getElementById('e-mare').value||null;

  renderTree(window._data);
  setTimeout(()=>{ const maps=buildMaps(window._data); openModal(p,maps); },100);
  saveToGitHub();
}

// ── GITHUB API: AUTO-DESAR ────────────────────────────────────
function getToken(){
  let tok=localStorage.getItem('gh_token');
  if(!tok){
    tok=prompt('🔑 Introdueix el teu GitHub Personal Access Token\n(es guardarà al navegador, no al codi):');
    if(tok) localStorage.setItem('gh_token',tok.trim());
  }
  return tok;
}

async function saveToGitHub(){
  const okEl=document.getElementById('save-ok');
  okEl.style.display='block'; okEl.style.color='#a07830'; okEl.textContent='⏳ Desant a GitHub…';

  const token=getToken();
  if(!token){ okEl.style.color='#c00'; okEl.textContent='❌ Cal un token per desar.'; return; }

  const repo=typeof GITHUB_REPO!=='undefined'?GITHUB_REPO:'runnercam66/arbre-genealogic';
  const file=typeof GITHUB_FILE!=='undefined'?GITHUB_FILE:'familia.json';
  const branch=typeof GITHUB_BRANCH!=='undefined'?GITHUB_BRANCH:'main';
  const apiUrl=`https://api.github.com/repos/${repo}/contents/${file}`;
  const headers={'Authorization':'token '+token,'Content-Type':'application/json'};

  try{
    // Obté el SHA actual del fitxer
    const res=await fetch(apiUrl+'?ref='+branch,{headers});
    if(res.status===401){ localStorage.removeItem('gh_token'); throw new Error('Token invàlid'); }
    if(!res.ok) throw new Error('HTTP '+res.status);
    const current=await res.json();

    // Codifica el contingut en Base64
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(window._data,null,2))));

    const upd=await fetch(apiUrl,{
      method:'PUT', headers,
      body:JSON.stringify({
        message:'Actualitza familia.json des de l\'arbre',
        content, sha:current.sha, branch
      })
    });
    if(!upd.ok) throw new Error('Error en desar: '+upd.status);

    okEl.style.color='#2e7d32';
    okEl.textContent='✅ Desat a GitHub! L\'arbre s\'actualitzarà en uns segons.';
  }catch(e){
    okEl.style.color='#c00';
    okEl.textContent='❌ Error: '+e.message;
    // Fallback: descarrega el JSON manualment
    const blob=new Blob([JSON.stringify(window._data,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='familia.json'; a.click();
  }
}

const canvas=document.getElementById('canvas');
let drag=false,sx,sy,sl,st;
canvas.addEventListener('mousedown',e=>{if(e.target.closest('.person'))return;drag=true;sx=e.pageX;sy=e.pageY;sl=canvas.scrollLeft;st=canvas.scrollTop;});
canvas.addEventListener('mousemove',e=>{if(!drag)return;e.preventDefault();canvas.scrollLeft=sl-(e.pageX-sx);canvas.scrollTop=st-(e.pageY-sy);});
['mouseup','mouseleave'].forEach(ev=>canvas.addEventListener(ev,()=>drag=false));
