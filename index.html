<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbre Genealògic · Família Santamaria-Castel</title>
<style>
  :root {
    --bg: #fdf8f0; --card-h: #7c4a1e; --card-f: #fff9f2;
    --card-border: #c8a87a; --line: #a07850;
    --blue: #3a6186; --pink: #a04060; --shadow: rgba(100,60,20,.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: Georgia, serif; overflow: hidden; }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--card-h); color: #fff;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; box-shadow: 0 2px 8px var(--shadow);
  }
  header h1 { font-size: 1.15rem; flex: 1; }
  header a, header button {
    background: rgba(255,255,255,.2); color: #fff;
    border: 1px solid rgba(255,255,255,.4); padding: 5px 12px;
    border-radius: 4px; cursor: pointer; font-size: .82rem;
    text-decoration: none; white-space: nowrap; font-family: inherit;
  }
  header a:hover, header button:hover { background: rgba(255,255,255,.35); }

  #canvas {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
    overflow: auto; cursor: grab;
  }
  #canvas:active { cursor: grabbing; }
  #tree-wrap { position: relative; min-width: 100%; min-height: 100%; padding: 60px 80px 120px; }

  #svg-lines {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; overflow: visible;
  }
  .line-couple { stroke: var(--line); stroke-width: 2; fill: none; }
  .line-child  { stroke: var(--line); stroke-width: 1.5; fill: none; }

  .gen-row {
    display: flex; align-items: flex-start; justify-content: center;
    gap: 24px; margin-bottom: 90px; flex-wrap: nowrap; position: relative;
  }
  .gen-label {
    writing-mode: vertical-rl; transform: rotate(180deg);
    font-size: .68rem; color: #bbb; letter-spacing: 1px;
    position: absolute; left: -60px; top: 50%; transform: translateY(-50%) rotate(180deg);
    text-transform: uppercase;
  }

  .family-unit { display: flex; flex-direction: column; align-items: center; }
  .couple-row  { display: flex; align-items: center; gap: 4px; }
  .heart { font-size: .95rem; color: var(--line); user-select: none; }

  .person {
    width: 150px; background: var(--card-f);
    border: 1.5px solid var(--card-border); border-radius: 8px;
    overflow: hidden; box-shadow: 0 2px 8px var(--shadow);
    cursor: pointer; transition: transform .15s, box-shadow .15s;
  }
  .person:hover { transform: translateY(-3px); box-shadow: 0 6px 18px var(--shadow); }
  .person.home { border-top: 4px solid var(--blue); }
  .person.dona { border-top: 4px solid var(--pink); }
  .person.jo   { outline: 3px solid gold; outline-offset: 1px; }

  .person-foto {
    width: 100%; height: 86px; background: #e8dcc8;
    display: flex; align-items: center; justify-content: center; font-size: 2.4rem;
    overflow: hidden;
  }
  .person-foto img { width: 100%; height: 100%; object-fit: cover; }

  .person-info { padding: 7px 8px; }
  .person-nom  { font-size: .8rem; font-weight: bold; color: #333; line-height: 1.2; }
  .person-dates{ font-size: .68rem; color: #999; margin-top: 2px; }

  /* MODAL */
  #modal-bg {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.5); align-items: center; justify-content: center;
  }
  #modal-bg.open { display: flex; }
  #modal {
    background: var(--card-f); border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
    max-width: 440px; width: 90%; max-height: 88vh; overflow-y: auto;
    padding: 26px; position: relative;
  }
  #modal-close {
    position: absolute; top: 10px; right: 14px;
    background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #aaa;
  }
  .modal-foto {
    width: 100%; height: 170px; border-radius: 8px; margin-bottom: 14px;
    background: #e8dcc8; display: flex; align-items: center; justify-content: center;
    font-size: 4rem; overflow: hidden;
  }
  .modal-foto img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  #modal h2 { font-size: 1.2rem; color: var(--card-h); margin-bottom: 2px; }
  #modal .sub { font-size: .8rem; color: #aaa; margin-bottom: 14px; }
  #modal dl { display: grid; grid-template-columns: auto 1fr; gap: 5px 12px; font-size: .86rem; }
  #modal dt { color: #999; }
  #modal dd { color: #333; }
  #modal .notes { margin-top: 12px; font-size: .83rem; color: #666; font-style: italic; border-top: 1px solid #eee; padding-top: 10px; }

  /* LOADING */
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: var(--bg); z-index: 300; gap: 14px;
  }
  .spinner {
    width: 38px; height: 38px; border: 3px solid #ddd;
    border-top-color: var(--card-h); border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--card-h); font-size: .95rem; }

  #legend {
    position: fixed; bottom: 14px; right: 16px; z-index: 100;
    background: rgba(255,249,242,.92); border: 1px solid var(--card-border);
    border-radius: 8px; padding: 8px 12px; font-size: .72rem; color: #777;
  }
  #legend div { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
  .lb { width: 14px; height: 10px; border-radius: 2px; border: 1px solid #c8a87a; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p id="load-txt">Carregant arbre…</p></div>

<header>
  <h1>🌳 Família Santamaria · Castel</h1>
  <a href="formulari.html" id="btn-add">＋ Afegir persona</a>
  <a href="admin.html">⚙ Admin</a>
  <button onclick="toggleLang()" id="btn-lang">Castellano</button>
</header>

<div id="canvas">
  <div id="tree-wrap">
    <svg id="svg-lines"></svg>
    <div id="tree"></div>
  </div>
</div>

<div id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-foto" class="modal-foto"></div>
    <h2 id="modal-nom"></h2>
    <div id="modal-sub" class="sub"></div>
    <dl id="modal-dl"></dl>
    <div id="modal-notes" class="notes" style="display:none"></div>
  </div>
</div>

<div id="legend">
  <div><div class="lb" style="border-top:4px solid #3a6186"></div><span id="lg-home">Home</span></div>
  <div><div class="lb" style="border-top:4px solid #a04060"></div><span id="lg-dona">Dona</span></div>
  <div><div class="lb" style="outline:2px solid gold"></div><span id="lg-jo">Tu</span></div>
</div>

<script src="config.js"></script>
<script>
// ── TRADUCCIONS ──────────────────────────────────────────────
const T = {
  ca: {
    load:'Carregant arbre…', addPerson:'＋ Afegir persona', lang:'Castellano',
    home:'Home', dona:'Dona', jo:'Tu',
    naix:'Nascut/da', lloc_naix:'Lloc de naixement',
    mort:'Mort/da', lloc_mort:'Lloc de defunció',
    pares:'Pares', fills:'Fills', parella:'Parella', notes:'Notes',
    ofici:'Ofici', llocs:'Llocs on va viure',
    gen:['Bisavis','Avis','Pares','Fills','Néts','Besnéts'],
  },
  es: {
    load:'Cargando árbol…', addPerson:'＋ Añadir persona', lang:'Català',
    home:'Hombre', dona:'Mujer', jo:'Tú',
    naix:'Nacido/a', lloc_naix:'Lugar de nacimiento',
    mort:'Fallecido/a', lloc_mort:'Lugar de defunción',
    pares:'Padres', fills:'Hijos', parella:'Pareja', notes:'Notas',
    ofici:'Oficio', llocs:'Lugares donde vivió',
    gen:['Bisabuelos','Abuelos','Padres','Hijos','Nietos','Bisnietos'],
  }
};
let lang = localStorage.getItem('lang') || 'ca';
let t = T[lang];

function toggleLang() {
  lang = lang === 'ca' ? 'es' : 'ca';
  t = T[lang];
  localStorage.setItem('lang', lang);
  document.getElementById('btn-lang').textContent = t.lang;
  document.getElementById('load-txt').textContent = t.load;
  document.getElementById('btn-add').textContent = t.addPerson;
  document.getElementById('lg-home').textContent = t.home;
  document.getElementById('lg-dona').textContent = t.dona;
  document.getElementById('lg-jo').textContent = t.jo;
  if (window._data) renderTree(window._data);
}

// ── DATA ─────────────────────────────────────────────────────
async function loadData() {
  // En local (sense GitHub), llegeix el fitxer directament
  // Un cop a GitHub Pages, usa FAMILIA_JSON_URL de config.js
  const url = (typeof FAMILIA_JSON_URL !== 'undefined' && FAMILIA_JSON_URL.includes('raw.githubusercontent'))
    ? FAMILIA_JSON_URL
    : 'familia.json';
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── TREE LOGIC ───────────────────────────────────────────────
function buildMaps({ persones, unions }) {
  const byId = {}, childrenOf = {}, parentsOf = {}, partnersOf = {};
  persones.forEach(p => {
    byId[p.id] = p;
    childrenOf[p.id] = [];
    parentsOf[p.id] = [];
    partnersOf[p.id] = [];
  });
  persones.forEach(p => {
    if (p.pare_id && byId[p.pare_id]) { parentsOf[p.id].push(p.pare_id); childrenOf[p.pare_id].push(p.id); }
    if (p.mare_id && byId[p.mare_id]) { parentsOf[p.id].push(p.mare_id); childrenOf[p.mare_id].push(p.id); }
  });
  (unions || []).forEach(u => {
    if (byId[u.persona1_id]) partnersOf[u.persona1_id].push(u.persona2_id);
    if (byId[u.persona2_id]) partnersOf[u.persona2_id].push(u.persona1_id);
  });
  return { byId, childrenOf, parentsOf, partnersOf };
}

function assignGen(persones, maps) {
  const { childrenOf, parentsOf } = maps;
  const gen = {};
  function dfs(id, g) {
    if (gen[id] !== undefined && gen[id] >= g) return;
    gen[id] = g;
    childrenOf[id].forEach(c => dfs(c, g + 1));
  }
  persones.filter(p => parentsOf[p.id].length === 0).forEach(p => dfs(p.id, 0));
  persones.forEach(p => { if (gen[p.id] === undefined) gen[p.id] = 0; });
  return gen;
}

// ── RENDER ───────────────────────────────────────────────────
function renderTree(data) {
  window._data = data;
  const { persones, unions } = data;
  const container = document.getElementById('tree');
  const svg = document.getElementById('svg-lines');
  container.innerHTML = ''; svg.innerHTML = '';

  const maps = buildMaps(data);
  const { byId, partnersOf } = maps;
  const gen = assignGen(persones, maps);
  const maxGen = Math.max(...Object.values(gen));

  const byGen = Array.from({ length: maxGen + 1 }, (_, i) => persones.filter(p => gen[p.id] === i));

  byGen.forEach((gp, g) => {
    const row = document.createElement('div');
    row.className = 'gen-row';
    row.dataset.gen = g;

    const lbl = document.createElement('span');
    lbl.className = 'gen-label';
    lbl.textContent = t.gen[g] || `G${g}`;
    row.appendChild(lbl);

    const seen = new Set();
    const groups = [];

    gp.forEach(p => {
      if (seen.has(p.id)) return;
      const partner = (partnersOf[p.id] || []).find(pid => gen[pid] === g && byId[pid]);
      if (partner && !seen.has(partner)) {
        groups.push([p, byId[partner]]);
        seen.add(p.id); seen.add(partner);
      } else if (!partner) {
        groups.push([p]);
        seen.add(p.id);
      }
    });

    groups.forEach(pair => {
      const unit = document.createElement('div');
      unit.className = 'family-unit';
      const crow = document.createElement('div');
      crow.className = 'couple-row';
      pair.forEach((person, i) => {
        if (i === 1) { const h = document.createElement('span'); h.className = 'heart'; h.textContent = '♡'; crow.appendChild(h); }
        crow.appendChild(makeCard(person, maps));
      });
      unit.appendChild(crow);
      row.appendChild(unit);
    });

    container.appendChild(row);
  });

  requestAnimationFrame(() => drawLines(persones, maps, gen));
}

function makeCard(p, maps) {
  const { byId, childrenOf, partnersOf } = maps;
  const card = document.createElement('div');
  card.className = 'person' + (p.genere ? ` ${p.genere}` : '');
  if (p.id === 'p13') card.classList.add('jo');
  card.dataset.id = p.id;

  const foto = document.createElement('div');
  foto.className = 'person-foto';
  if (p.foto_url) {
    const img = document.createElement('img');
    img.src = p.foto_url; img.alt = p.nom;
    img.onerror = () => { foto.innerHTML = ''; foto.textContent = p.genere === 'dona' ? '👩' : '👨'; };
    foto.appendChild(img);
  } else {
    foto.textContent = p.genere === 'dona' ? '👩' : p.genere === 'home' ? '👨' : '🧑';
  }

  const info = document.createElement('div');
  info.className = 'person-info';
  const nom = document.createElement('div');
  nom.className = 'person-nom';
  nom.textContent = [p.nom, p.cognom1, p.cognom2].filter(Boolean).join(' ');
  const dates = document.createElement('div');
  dates.className = 'person-dates';
  const ny = p.data_naix ? p.data_naix.slice(0,4) : null;
  const dy = p.data_mort ? p.data_mort.slice(0,4) : null;
  dates.textContent = ny ? (dy ? `${ny} – ${dy}` : `* ${ny}`) : '';
  info.append(nom, dates);
  card.append(foto, info);
  card.addEventListener('click', () => openModal(p, maps));
  return card;
}

function drawLines(persones, maps, gen) {
  const { byId } = maps;
  const wrap = document.getElementById('tree-wrap');
  const svg  = document.getElementById('svg-lines');
  const canvas = document.getElementById('canvas');
  const wRect = wrap.getBoundingClientRect();

  function pos(id) {
    const el = document.querySelector(`.person[data-id="${id}"]`);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    const x = r.left - wRect.left + canvas.scrollLeft;
    const y = r.top  - wRect.top  + canvas.scrollTop;
    return { x, y, w: r.width, h: r.height, cx: x + r.width/2, top: y, bot: y + r.height };
  }

  svg.setAttribute('width',  wrap.scrollWidth);
  svg.setAttribute('height', wrap.scrollHeight);

  // Couple lines
  (window._data.unions || []).forEach(u => {
    if (gen[u.persona1_id] !== gen[u.persona2_id]) return;
    const r1 = pos(u.persona1_id), r2 = pos(u.persona2_id);
    if (!r1 || !r2) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', r1.x + r1.w); line.setAttribute('y1', r1.cx - r1.w/2 + r1.h/2);
    line.setAttribute('x2', r2.x);         line.setAttribute('y2', r1.cx - r1.w/2 + r1.h/2);
    // Simplify: just midpoint horizontal line
    const l2 = document.createElementNS('http://www.w3.org/2000/svg','line');
    l2.setAttribute('x1', r1.x + r1.w); l2.setAttribute('y1', r1.top + r1.h/2);
    l2.setAttribute('x2', r2.x);        l2.setAttribute('y2', r1.top + r1.h/2);
    l2.setAttribute('class','line-couple');
    svg.appendChild(l2);
  });

  // Parent→child lines
  persones.forEach(child => {
    const pIds = [child.pare_id, child.mare_id].filter(id => id && byId[id]);
    if (!pIds.length) return;
    const rc = pos(child.id);
    if (!rc) return;
    const prects = pIds.map(pos).filter(Boolean);
    if (!prects.length) return;
    const px = prects.reduce((s,r) => s + r.cx, 0) / prects.length;
    const py = prects[0].bot;
    const mid = (py + rc.top) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M ${px} ${py} C ${px} ${mid}, ${rc.cx} ${mid}, ${rc.cx} ${rc.top}`);
    path.setAttribute('class','line-child');
    svg.appendChild(path);
  });
}

// ── MODAL ────────────────────────────────────────────────────
function openModal(p, maps) {
  const { byId, childrenOf, partnersOf } = maps;
  const fotoEl = document.getElementById('modal-foto');
  fotoEl.innerHTML = p.foto_url ? `<img src="${p.foto_url}" alt="${p.nom}">` : (p.genere === 'dona' ? '👩' : p.genere === 'home' ? '👨' : '🧑');
  document.getElementById('modal-nom').textContent = [p.nom, p.cognom1, p.cognom2].filter(Boolean).join(' ');
  document.getElementById('modal-sub').textContent = p.genere === 'home' ? t.home : p.genere === 'dona' ? t.dona : '';
  const dl = document.getElementById('modal-dl');
  dl.innerHTML = '';
  const add = (lbl, val) => { if (!val) return; dl.innerHTML += `<dt>${lbl}</dt><dd>${val}</dd>`; };
  const fmt = d => d ? new Date(d).toLocaleDateString(lang === 'ca' ? 'ca-ES' : 'es-ES') : null;
  const nomComplet = x => [x.nom, x.cognom1, x.cognom2].filter(Boolean).join(' ');
  add(t.naix, fmt(p.data_naix));
  add(t.lloc_naix, p.lloc_naix);
  if (p.data_mort || p.lloc_mort) { add(t.mort, fmt(p.data_mort) || '—'); add(t.lloc_mort, p.lloc_mort); }
  add(t.ofici, p.ofici);
  if (p.llocs && p.llocs.length) add(t.llocs, p.llocs.join(', '));
  const partners = (partnersOf[p.id]||[]).map(id=>byId[id]).filter(Boolean);
  if (partners.length) add(t.parella, partners.map(nomComplet).join(', '));
  const pare = p.pare_id && byId[p.pare_id], mare = p.mare_id && byId[p.mare_id];
  if (pare || mare) add(t.pares, [pare,mare].filter(Boolean).map(nomComplet).join(' · '));
  const fills = (childrenOf[p.id]||[]).map(id=>byId[id]).filter(Boolean);
  if (fills.length) add(t.fills, fills.map(nomComplet).join(', '));
  const notesEl = document.getElementById('modal-notes');
  notesEl.textContent = p.notes || '';
  notesEl.style.display = p.notes ? 'block' : 'none';
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

// ── PAN ──────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
let drag = false, sx, sy, sl, st;
canvas.addEventListener('mousedown', e => {
  if (e.target.closest('.person')) return;
  drag = true; sx = e.pageX; sy = e.pageY; sl = canvas.scrollLeft; st = canvas.scrollTop;
});
canvas.addEventListener('mousemove', e => {
  if (!drag) return; e.preventDefault();
  canvas.scrollLeft = sl - (e.pageX - sx);
  canvas.scrollTop  = st - (e.pageY - sy);
});
['mouseup','mouseleave'].forEach(ev => canvas.addEventListener(ev, () => drag = false));

// ── INIT ─────────────────────────────────────────────────────
document.getElementById('load-txt').textContent = t.load;
document.getElementById('btn-lang').textContent = t.lang;
document.getElementById('btn-add').textContent = t.addPerson;
document.getElementById('lg-home').textContent = t.home;
document.getElementById('lg-dona').textContent = t.dona;
document.getElementById('lg-jo').textContent = t.jo;

loadData().then(data => {
  renderTree(data);
  document.getElementById('loading').style.display = 'none';
}).catch(err => {
  document.getElementById('tree').innerHTML =
    `<p style="color:red;padding:40px;font-family:monospace">Error carregant dades:<br>${err.message}<br><br>Comprova config.js → FAMILIA_JSON_URL</p>`;
  document.getElementById('loading').style.display = 'none';
});
</script>
</body>
</html>
